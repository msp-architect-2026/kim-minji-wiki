nameOverride: ""
fullnameOverride: ""

image:
  repository: frontend
  tag: "test"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

# 리소스는 PoC 기본값 (필요 시 조절)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

# (선택) SPA 라우팅 fallback이 필요하면 true
nginxSpaFallback:
  enabled: true
  # 필요 시 root 경로 조정 가능
  # locationRoot: /usr/share/nginx/html

# 프론트는 보통 별도 health endpoint가 없으니 Nginx 기본 체크로 처리(포트 열림 확인)
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6


serviceAccount:
  create: false
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  rules: []


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""