nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: backend
  tag: "test"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: "prod"
  AI_SERVER_URL: "http://ai-serving:8000"

secret:
  name: backend-secret
  keys:
    DB_URL: DB_URL
    DB_USERNAME: DB_USERNAME
    DB_PASSWORD: DB_PASSWORD
    AWS_ACCESS_KEY: AWS_ACCESS_KEY
    AWS_SECRET_KEY: AWS_SECRET_KEY
    AWS_REGION: AWS_REGION
    AWS_BUCKET: AWS_BUCKET

probes:
  enabled: true
  readiness:
    path: /actuator/health
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80