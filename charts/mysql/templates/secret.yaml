apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.rootPassword }}: "CHANGE_ME"
  {{ .Values.secret.keys.database }}: "waferdb"
  {{ .Values.secret.keys.username }}: "admin"
  {{ .Values.secret.keys.password }}: "CHANGE_ME"