stages:
  - test
  - build
  - push

variables:
  REGISTRY: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_COMMIT_SHA

test:backend:
  stage: test
  image: gradle:8-jdk17-alpine
  tags:
    - arm64
  script:
    - cd backend
    - ./gradlew test --no-daemon
  only:
    - main
    - staging

test:ai:
  stage: test
  image: python:3.11-slim
  tags:
    - arm64
  script:
    - cd ai
    - pip install -r requirements.txt
    - pytest tests/ -v
  only:
    - main
    - staging

build:backend:
  stage: build
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --platform linux/arm64 -t $REGISTRY/backend:$IMAGE_TAG -t $REGISTRY/backend:latest ./backend
  only:
    - main

build:ai:
  stage: build
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --platform linux/arm64 -t $REGISTRY/ai-serving:$IMAGE_TAG -t $REGISTRY/ai-serving:latest ./ai
  only:
    - main

build:frontend:
  stage: build
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --platform linux/arm64 -t $REGISTRY/frontend:$IMAGE_TAG -t $REGISTRY/frontend:latest ./frontend
  only:
    - main

push:backend:
  stage: push
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $REGISTRY/backend:$IMAGE_TAG
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker push $REGISTRY/backend:latest
      fi
  only:
    - main

push:ai:
  stage: push
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $REGISTRY/ai-serving:$IMAGE_TAG
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker push $REGISTRY/ai-serving:latest
      fi
  only:
    - main

push:frontend:
  stage: push
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $REGISTRY/frontend:$IMAGE_TAG
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker push $REGISTRY/frontend:latest
      fi
  only:
    - main
